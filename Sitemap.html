<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sitemap Explorer</title>

<style>
  body {
    margin: 0;
    font-family: Segoe UI, Roboto, sans-serif;
    background: transparent;
  }

  .explorer {
    width: 300px;
    background: #fff;
    border-right: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
  }

  .header {
    padding: 10px;
    font-weight: 600;
    border-bottom: 1px solid #ddd;
    background: #f6f8fa;
  }

  .row {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
  }


  .row:hover {
    background: #e8f0fe;
  }
  
	.ext:hover {
	  color: #1f6feb;
	}

	.row span:last-child:hover {
	  opacity: 1;
	  color: #1f6feb;
	}



  .indent {
    width: 16px;
  }

  .icon {
    width: 20px;
  }

  .folder::before { content: "📁"; }
  .file::before { content: "📄"; }

  .name {
    flex: 1;
  }

  .arrow {
    width: 16px;
    font-size: 10px;
    margin-right: 4px;
  }

  .collapsed > .children {
    display: none;
  }

  .children {
    margin-left: 0;
  }

  a {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex: 1;
  }

  /* Dark Mode */
  @media (prefers-color-scheme: dark) {
    .explorer { background: #161b22; border-color: #30363d; }
    .header { background: #161b22; border-color: #30363d; }
    .row:hover { background: #1f6feb33; }
    body { color: #c9d1d9; }
  }
  
  
  
.layout {
  display: flex;
  height: 100vh;   /* optional, volle Höhe */
}

.explorer {
  width: 300px;
  flex-shrink: 0; /* bleibt fix */
}

#viewer_weg {
  flex: 1;              /* nimmt restlichen Platz */
  height: 800px;
  border: 1px solid #ccc;
}


#viewer {
  flex: 1;
  min-width: 600px;
  height: 800px;
}


.active {
  background: #d0e3ff;
}




  
</style>
</head>

<body>

<div class="layout">

	<div class="explorer">
	  <div class="header">🗂️ Sitemap Explorer</div>
	  <div id="tree"></div>
	</div>
	<iframe id="viewer" width="1200" height="800" style="border:1px solid #ccc;"></iframe>

</div>

<script>
const excluded = ["_includes", "_layouts", ".github"];


let inIframe = false;
try { inIframe = window.self !== window.top; } catch (e) { inIframe = true; }


const isSitemapPage = window.location.pathname.endsWith("Sitemap.html");

if (inIframe && isSitemapPage) {
  document.body.style.display = "none";
}


fetch("/sitemap.xml")
  .then(res => res.text())
  .then(str => new DOMParser().parseFromString(str, "text/xml"))
  .then(xml => {
    const urls = Array.from(xml.getElementsByTagName("loc")).map(n => n.textContent);
    const tree = {};

    function insertPath(url) {
      const path = new URL(url).pathname.replace(/^\/|\/$/g, "");
      if (!path) return;

      const parts = path.split("/");

      if (parts.some(p => excluded.some(ex => p.startsWith(ex)))) return;

      let current = tree;
      parts.forEach((part, i) => {
        if (!current[part]) {
          current[part] = (i === parts.length - 1) ? null : {};
        }
        current = current[part];
      });
    }

    urls.forEach(insertPath);

    let firstFolderOpened = false;

    function createNode(key, value, container, depth = 0, basePath = "") {
      const row = document.createElement("div");
      row.className = "row";

      for (let i = 0; i < depth; i++) {
        const indent = document.createElement("span");
        indent.className = "indent";
        row.appendChild(indent);
      }

      const arrow = document.createElement("span");
      arrow.className = "arrow";
      row.appendChild(arrow);

      const icon = document.createElement("span");
      icon.className = "icon " + (value === null ? "file" : "folder");
      row.appendChild(icon);

      const name = document.createElement("span");
      name.className = "name";
      name.textContent = key;


	if (value === null) {

	  const url = basePath + "/" + key;

	  const linkWrapper = document.createElement("span");
	  linkWrapper.style.display = "flex";
	  linkWrapper.style.alignItems = "center";
	  linkWrapper.style.gap = "6px";

	  // 👉 Name (iframe Navigation)
	  const link = document.createElement("a");
	  link.href = "#";
	  link.appendChild(name);

	  link.onclick = (e) => {
		e.preventDefault();

		row.classList.add("active");

		if (inIframe) {
		  window.open(url, "_blank", "noopener");
		} else {
		  const iframe = document.getElementById("viewer");
		  if (iframe) iframe.src = url;
		}
	  };

	  // 👉 Pfeil direkt daneben
	  const ext = document.createElement("span");
	  ext.textContent = "↗";
	  ext.style.fontSize = "12px";
	  ext.style.cursor = "pointer";
	  ext.style.opacity = "0.7";

	  ext.onclick = (e) => {
		e.stopPropagation();
		window.open(url, "_blank", "noopener");
	  };

	  // 👉 zusammenbauen
	  linkWrapper.appendChild(link);
	  linkWrapper.appendChild(ext);

	  row.appendChild(linkWrapper);
	  container.appendChild(row);
	}
	  else {
        row.appendChild(name);
        container.appendChild(row);

        const wrapper = document.createElement("div");
        wrapper.classList.add("collapsed");

        const childrenContainer = document.createElement("div");
        childrenContainer.className = "children";

        wrapper.appendChild(childrenContainer);
        container.appendChild(wrapper);

        // 👉 erster Ordner automatisch öffnen
        if (!firstFolderOpened) {
          wrapper.classList.remove("collapsed");
          arrow.textContent = "▼";
          firstFolderOpened = true;
        } else {
          arrow.textContent = "▶";
        }

        row.onclick = () => {
          wrapper.classList.toggle("collapsed");
          arrow.textContent = wrapper.classList.contains("collapsed") ? "▶" : "▼";
        };

        for (const child in value) {
          createNode(child, value[child], childrenContainer, depth + 1, basePath + "/" + key);
        }
      }
    }

    const root = document.getElementById("tree");

    for (const key in tree) {
      createNode(key, tree[key], root, 0, "");
    }
  });
</script>

</body>
</html>
