<meta charset="utf-8">
<title>Base64-Konverter – Safe Mode</title>
<meta name="viewport" content="width=device-width, initial-scale=1"> <style type="text/css">
  :root { --bg:#f8f9fb; --panel:#fff; --border:#e5e7eb; --muted:#6b7280; --accent:#2563eb; --accent2:#3b82f6; }
  html,body{height:100%} body{margin:0;padding:20px;background:var(--bg);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Ubuntu,Cantarell,"Noto Sans",sans-serif;color:#111827}
  h1{margin:0 0 12px;font-size:20px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;
    box-shadow:0 12px 30px rgba(0,0,0,.06);padding:16px;max-width:1100px;margin:0 auto 18px}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .muted{color:var(--muted);font-size:13px}
  button,.btn{padding:8px 12px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer}
  button:hover,.btn:hover{background:#f3f4f6}
  .btn.primary{border-color:var(--accent);background:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent2)}
  .drop{margin-top:12px;border:2px dashed var(--border);border-radius:12px;padding:22px;text-align:center;color:var(--muted);
    transition:border-color .15s,background .15s}
  .drop.dragover{border-color:var(--accent);background:#eef2ff;color:#1f2937}
  .list{margin-top:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  .item{border:1px solid var(--border);border-radius:10px;padding:10px;background:#fff;display:flex;flex-direction:column;gap:8px}
  .item h3{margin:0;font-size:15px;display:flex;align-items:center;gap:8px}
  .meta{font-size:12px;color:var(--muted)}
  .preview{display:flex;gap:10px;align-items:center;border:1px dashed var(--border);border-radius:8px;padding:8px}
  .preview img{max-width:64px;max-height:64px;object-fit:contain}
  .pre{white-space:pre-wrap;word-break:break-all;background:#f8fafc;padding:8px;border:1px solid var(--border);
    border-radius:8px;max-height:180px;overflow:auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .error{color:#b91c1c;background:#fee2e2;border:1px solid #fecaca;border-radius:8px;padding:6px 8px;font-size:13px}
  .ok{color:#14532d;background:#dcfce7;border:1px solid #bbf7d0;border-radius:8px;padding:6px 8px;font-size:13px}
</style>
<div class="panel">
<h1>Base64‑Konverter &ndash; Safe Mode</h1>
<div class="row"><label class="btn">       Dateien w&auml;hlen       <input id="picker" type="file" multiple="" accept=".gif,.png,.jpg,.jpeg,.ico,.bmp,.webp" style="display:none" />     </label>     <button id="btnClear">Ausgabe leeren</button>     <button id="btnExportJSON" class="btn">Als JSON speichern</button>     <button id="btnExportTXT" class="btn">Als TXT speichern</button>     <span class="muted">Ziehe lokale Dateien aus dem Dateimanager in die Fl&auml;che unten (keine Links aus Webseiten).</span></div>
<div id="drop" class="drop" tabindex="0" aria-label="Drag &amp; Drop Zone"><strong>Drag &amp; Drop</strong> hier ablegen<br />
<span class="muted">Unterst&uuml;tzt GIF/PNG/JPG/ICO/BMP/WEBP. Mehrfachauswahl m&ouml;glich.</span></div>
<div id="status" class="muted" style="margin-top:8px;">&nbsp;</div>
<div id="list" class="list" aria-live="polite">&nbsp;</div>
</div>
<script>
  // ====== 1) Global Navigation via Drag&Drop verhindern ======
  ['dragenter','dragover','dragleave','drop'].forEach(ev => {
    window.addEventListener(ev, e => {
      e.preventDefault();
      e.stopPropagation();
    }, { capture: true });
  });

  // Optionaler Schutz vor versehentlichem Schließen (nur wenn Ergebnisse da sind)
  let hasResults = false;
  window.addEventListener('beforeunload', (e) => {
    if (hasResults) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  // ====== 2) Hilfsfunktionen ======
  function inferKeyFromFilename(name) {
    const n = name.toLowerCase();
    if (n.includes('wsth')) return 'wsth';
    if (n.includes('ssth')) return 'ssth';
    if (n.includes('wst'))  return 'wst';
    if (n.includes('sst'))  return 'sst';
    if (n.includes('flag_en')) return 'flag_en';
    if (n.includes('flag_de')) return 'flag_de';
    if (n.includes('nikolaus-haus') || n.includes('nikohaus')) return 'nikohaus';
    if (n.includes('leer')) return 'leer';
    return name.replace(/\.[^.]+$/, '').replace(/\W+/g, '_');
  }
  function mimeForFilename(name) {
    const n = name.toLowerCase();
    if (n.endsWith('.gif'))  return 'image/gif';
    if (n.endsWith('.png'))  return 'image/png';
    if (n.endsWith('.jpg') || n.endsWith('.jpeg')) return 'image/jpeg';
    if (n.endsWith('.webp')) return 'image/webp';
    if (n.endsWith('.ico'))  return 'image/x-icon';
    if (n.endsWith('.bmp'))  return 'image/bmp';
    return 'application/octet-stream';
  }

  const results = [];
  const listEl = document.getElementById('list');
  const dropEl = document.getElementById('drop');
  const statusEl = document.getElementById('status');

  async function fileToBase64(file) {
    const mimeHint = mimeForFilename(file.name);
    const b64 = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => {
        const s = String(fr.result);
        const parts = s.split(';base64,');
        if (parts.length < 2) return reject(new Error('Unerwartetes DataURL-Format'));
        resolve(parts[1]);
      };
      fr.onerror = reject;
      fr.readAsDataURL(file);
    });
    const dataUri = `data:${mimeHint};base64,${b64}`;
    return { mime: mimeHint, b64, dataUri };
  }

  function renderItem(r) {
    const wrap = document.createElement('div');
    wrap.className = 'item';

    const h = document.createElement('h3');
    h.textContent = `${r.key} (${r.mime}, len=${r.length})`;
    const meta = document.createElement('span');
    meta.className = 'meta';
    meta.textContent = `Datei: ${r.name}`;
    h.appendChild(meta);

    const preview = document.createElement('div');
    preview.className = 'preview';
    const img = document.createElement('img');
    img.alt = r.key;
    img.src = r.dataUri;
    const info = document.createElement('div');
    info.innerHTML = `<div class="muted">Vorschau (max 64×64) &nbsp;|&nbsp; Data‑URI unten</div>`;
    preview.appendChild(img);
    preview.appendChild(info);

    const pre = document.createElement('div');
    pre.className = 'pre';
    pre.textContent = r.dataUri;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const btnCopyConsts = document.createElement('button');
    btnCopyConsts.textContent = 'Konstanten kopieren';
    btnCopyConsts.onclick = () => {
      const text =
`// ${r.key} (${r.mime})
const B64_${r.key.toUpperCase()} = '${r.b64}';
const URI_${r.key.toUpperCase()} = 'data:${r.mime};base64,' + B64_${r.key.toUpperCase()};
`;
      navigator.clipboard.writeText(text).then(() => {
        btnCopyConsts.textContent = 'Kopiert!';
        setTimeout(() => btnCopyConsts.textContent = 'Konstanten kopieren', 1200);
      }).catch(() => {
        // clipboard evtl. per Policy blockiert
        const msg = document.createElement('div');
        msg.className = 'error';
        msg.textContent = 'Kopieren nicht erlaubt (Policy). Markiere den Text unten manuell und kopiere ihn.';
        wrap.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
      });
    };

    const btnCopySrc = document.createElement('button');
    btnCopySrc.textContent = 'src‑Zuweisung kopieren';
    btnCopySrc.onclick = () => {
      const text = `${r.key}.src = '${r.dataUri}';`;
      navigator.clipboard.writeText(text).then(() => {
        btnCopySrc.textContent = 'Kopiert!';
        setTimeout(() => btnCopySrc.textContent = 'src‑Zuweisung kopieren', 1200);
      }).catch(() => {
        const msg = document.createElement('div');
        msg.className = 'error';
        msg.textContent = 'Kopieren nicht erlaubt (Policy). Markiere die Data‑URI manuell und kopiere sie.';
        wrap.appendChild(msg);
        setTimeout(() => msg.remove(), 3000);
      });
    };

    actions.appendChild(btnCopyConsts);
    actions.appendChild(btnCopySrc);

    wrap.appendChild(h);
    wrap.appendChild(preview);
    wrap.appendChild(pre);
    wrap.appendChild(actions);
    listEl.appendChild(wrap);
  }

  function upsertResult(entry) {
    const idx = results.findIndex(x => x.key === entry.key);
    if (idx >= 0) results[idx] = entry; else results.push(entry);
    hasResults = results.length > 0;
  }

  async function handleFiles(files) {
    if (!files || !files.length) {
      statusEl.innerHTML = '<div class="error">Keine lokalen Dateien im Drop‑Event gefunden. '
        + 'Bitte Dateien aus dem Dateimanager (Explorer/Finder) hierher ziehen – nicht Links aus Webseiten.</div>';
      return;
    }
    statusEl.innerHTML = `<div class="ok">${files.length} Datei(en) werden verarbeitet …</div>`;
    for (const file of files) {
      try {
        const key = inferKeyFromFilename(file.name);
        const { mime, b64, dataUri } = await fileToBase64(file);
        const entry = { key, name: file.name, mime, b64, dataUri, length: b64.length };
        upsertResult(entry);
        renderItem(entry);
      } catch (e) {
        const wrap = document.createElement('div');
        wrap.className = 'item';
        wrap.innerHTML = `<h3>${file.name} (Fehler)</h3><div class="error">${String(e)}</div>`;
        listEl.appendChild(wrap);
      }
    }
    statusEl.textContent = '';
  }

  // ====== 3) Drop‑Zone Events ======
  ['dragenter','dragover'].forEach(ev => {
    dropEl.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation();
      dropEl.classList.add('dragover');
    });
  });
  ['dragleave','drop'].forEach(ev => {
    dropEl.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation();
      dropEl.classList.remove('dragover');
    });
  });
  dropEl.addEventListener('drop', async e => {
    const dt = e.dataTransfer;
    let files = [];
    if (dt?.items && dt.items.length) {
      for (const it of dt.items) {
        if (it.kind === 'file') {
          const f = it.getAsFile();
          if (f) files.push(f);
        }
      }
    } else if (dt?.files && dt.files.length) {
      files = Array.from(dt.files);
    }
    await handleFiles(files);
  });

  // ====== 4) Dateidialog ======
  document.getElementById('picker').addEventListener('change', async e => {
    const files = Array.from(e.target.files || []);
    await handleFiles(files);
  });

  // ====== 5) Ausgabe leeren ======
  document.getElementById('btnClear').addEventListener('click', () => {
    results.splice(0, results.length);
    listEl.innerHTML = '';
    hasResults = false;
    statusEl.textContent = '';
  });

  // ====== 6) Export JSON/TXT ======
  document.getElementById('btnExportJSON').addEventListener('click', () => {
    const out = {};
    for (const r of results) out[r.key] = { mime: r.mime, b64: r.b64 };
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'muehle_base64_assets.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });
  document.getElementById('btnExportTXT').addEventListener('click', () => {
    let text = '';
    for (const r of results) {
      text += `// ${r.key} (${r.mime})\n`;
      text += `const B64_${r.key.toUpperCase()}='${r.b64}';\n`;
      text += `const URI_${r.key.toUpperCase()}='data:${r.mime};base64,'+B64_${r.key.toUpperCase()};\n\n`;
    }
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'muehle_base64_assets.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  });
</script>   </meta>
</meta>
