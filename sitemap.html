<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sitemap Explorer</title>

<style>
  body {
    font-family: Segoe UI, Roboto, sans-serif;
    margin: 0;
    background: #f3f3f3;
    color: #222;
  }

  header {
    background: #ffffff;
    padding: 12px 20px;
    border-bottom: 1px solid #ddd;
    font-weight: 600;
  }

  .explorer {
    max-width: 900px;
    margin: 20px auto;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #ddd;
  }

  .row {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
  }

  .row:hover {
    background: #e8f0fe;
  }

  .indent {
    display: inline-block;
    width: 16px;
  }

  .icon {
    width: 20px;
  }

  .folder::before {
    content: "📁";
  }

  .file::before {
    content: "📄";
  }

  .name {
    flex: 1;
  }

  .arrow {
    width: 16px;
    font-size: 10px;
    margin-right: 4px;
  }

  .collapsed > .children {
    display: none;
  }

  .children {
    margin-left: 20px;
  }

  a {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex: 1;
  }

  /* Dark Mode */
  @media (prefers-color-scheme: dark) {
    body { background: #0d1117; color: #c9d1d9; }
    .explorer { background: #161b22; border-color: #30363d; }
    header { background: #161b22; border-color: #30363d; }
    .row:hover { background: #1f6feb33; }
  }
</style>
</head>

<body>

<header>🗂️ Sitemap Explorer</header>

<div class="explorer" id="tree"></div>
