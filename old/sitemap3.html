<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sitemap Explorer</title>

<style>
  body {
    font-family: Segoe UI, Roboto, sans-serif;
    margin: 0;
    background: #f3f3f3;
    color: #222;
  }

  header {
    background: #ffffff;
    padding: 12px 20px;
    border-bottom: 1px solid #ddd;
    font-weight: 600;
  }

  .explorer {
    max-width: 900px;
    margin: 20px auto;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #ddd;
  }

  .row {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
  }

  .row:hover {
    background: #e8f0fe;
  }

  .indent {
    display: inline-block;
    width: 16px;
  }

  .icon {
    width: 20px;
  }

  .folder::before {
    content: "📁";
  }

  .file::before {
    content: "📄";
  }

  .name {
    flex: 1;
  }

  .arrow {
    width: 16px;
    font-size: 10px;
    margin-right: 4px;
  }

  .collapsed > .children {
    display: none;
  }

  .children {
    margin-left: 20px;
  }

  a {
    text-decoration: none;
    color: inherit;
    display: flex;
    flex: 1;
  }

  /* Dark Mode */
  @media (prefers-color-scheme: dark) {
    body { background: #0d1117; color: #c9d1d9; }
    .explorer { background: #161b22; border-color: #30363d; }
    header { background: #161b22; border-color: #30363d; }
    .row:hover { background: #1f6feb33; }
  }
</style>
</head>

<body>

<header>🗂️ Sitemap Explorer</header>

<div class="explorer" id="tree"></div>

<script>
const excluded = ["_includes", "_layouts", ".github"];

fetch("/sitemap.xml")
  .then(res => res.text())
  .then(str => new DOMParser().parseFromString(str, "text/xml"))
  .then(xml => {
    const urls = Array.from(xml.getElementsByTagName("loc")).map(n => n.textContent);
    const tree = {};

    function insertPath(url) {
      const path = new URL(url).pathname.replace(/^\/|\/$/g, "");
      if (!path) return;

      const parts = path.split("/");

      if (parts.some(p => excluded.some(ex => p.startsWith(ex)))) return;

      let current = tree;
      parts.forEach((part, i) => {
        if (!current[part]) {
          current[part] = (i === parts.length - 1) ? null : {};
        }
        current = current[part];
      });
    }

    urls.forEach(insertPath);

    function createNode(key, value, container, depth = 0, basePath = "") {
      const row = document.createElement("div");
      row.className = "row";

      for (let i = 0; i < depth; i++) {
        const indent = document.createElement("span");
        indent.className = "indent";
        row.appendChild(indent);
      }

      const arrow = document.createElement("span");
      arrow.className = "arrow";
      row.appendChild(arrow);

      const icon = document.createElement("span");
      icon.className = "icon " + (value === null ? "file" : "folder");
      row.appendChild(icon);

      const name = document.createElement("span");
      name.className = "name";
      name.textContent = key;

      if (value === null) {
        const link = document.createElement("a");
        link.href = basePath + "/" + key;
        link.appendChild(name);
        row.appendChild(link);
      } else {
        row.appendChild(name);
      }

      container.appendChild(row);

      if (value !== null) {
        const childrenContainer = document.createElement("div");
        childrenContainer.className = "children";
        container.appendChild(childrenContainer);

        const wrapper = document.createElement("div");
        wrapper.classList.add("collapsed");

        arrow.textContent = "▶";

        row.onclick = () => {
          wrapper.classList.toggle("collapsed");
          arrow.textContent = wrapper.classList.contains("collapsed") ? "▶" : "▼";
        };

        wrapper.appendChild(childrenContainer);
        container.appendChild(wrapper);

        for (const child in value) {
          createNode(child, value[child], childrenContainer, depth + 1, basePath + "/" + key);
        }
      }
    }

    const root = document.getElementById("tree");

    for (const key in tree) {
      createNode(key, tree[key], root, 0, "");
    }
  });
</script>

</body>
</html>
