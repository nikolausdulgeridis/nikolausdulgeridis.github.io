<!-- #******************************# //-->  <!-- # NikolausDulgeridis@gmail.com # //-->  <!-- #******************************# //-->   <script language="JavaScript">

/* ****** Options ****** */
var takefrommillallowed=0; /* 0=disallowed 1=allowed if only mills 2=free */
var animated=1;            /* Animated moves*/
var internally=1;          /* only internal calls */

if(1) imgpath = "https://img.webme.com/pic/n/nikolausdulgeridis/";
if (("bla"+window.location.href).indexOf("file")>1) imgpath = "./";

var language="en";
if (window.location.href.indexOf(".com")>1) language="en";
if (window.location.href.indexOf(".de")>1)  language="de";
/* *** End of Options *** */

var selfplaymode=0;
var winforwhite=0;
var winforblack=0;
var drawgames=0;

function clrselfplay()
{
 if (selfplaymode) selfplay();
}

function selfplay()
{
 selfplaymode= 1-selfplaymode;
 if (selfplaymode)
   document.getElementById("BtnSelfplay").value="Stop";
 if (selfplaymode==0)
   document.getElementById("BtnSelfplay").value="Auto";
 selfplayauto();
}

function selfplayautonew()
{
  string2spf("0000000000000000000000000");
  selfplayauto();
}

function selfplayauto()
{
   clearmove();
   if (selfplaymode==0) return;

   if (makezgglist(farbe).length==0 || zugnr>140)
     {
     if (zugnr>140) drawgames++;
     if (makezgglist(farbe).length==0)
       {
       if (farbe==2) winforwhite++; else winforblack++;
       }
     ausgabe("Win for White: "+winforwhite+" Win for black: "+winforblack+" Draw game: "+drawgames);
     window.setTimeout("selfplayautonew()", 8000);
     return;
     }
   if(makezgglist(farbe).length)
     {
     if (document.forms[0].strlastpos)
       document.forms[0].strlastpos.value= spf2string(spfeld,zugnr);
     computemove();
     highaf();
     if (0) window.setTimeout("selfplayauto()", 1500);
     }
}

var mymove=0;
timebase=333;

function highaf()
{
  window.setTimeout("highaf0()", timebase);
}
function highaf0()
{
 mymove=1;
  if (letzterbestzug.af>24) alert("fehler-af"+letzterbestzug.af);
  if (letzterbestzug.af==0) return highzf();
  if (farbe==2) window.document.images[letzterbestzug.af+ofs].src = wsth.src;
  if (farbe==1) window.document.images[letzterbestzug.af+ofs].src = ssth.src;
  window.setTimeout("unhighaf()", timebase);
}
function unhighaf()
{
  if (farbe==2) window.document.images[letzterbestzug.af+ofs].src = wst.src;
  if (farbe==1) window.document.images[letzterbestzug.af+ofs].src = sst.src;
  highzf();
}
function highzf()
{
  if (letzterbestzug.af) window.document.images[letzterbestzug.af+ofs].src = leer.src;
  if (letzterbestzug.zf==0) return;
  if (letzterbestzug.zf>24) alert("fehler-zf"+letzterbestzug.zf);
  if (farbe==2) window.document.images[letzterbestzug.zf+ofs].src = wsth.src;
  if (farbe==1) window.document.images[letzterbestzug.zf+ofs].src = ssth.src;
  window.setTimeout("unhighzf()",timebase);
}
function unhighzf()
{
  if (farbe==2) window.document.images[letzterbestzug.zf+ofs].src = wst.src;
  if (farbe==1) window.document.images[letzterbestzug.zf+ofs].src = sst.src;
if (letzterbestzug.wnf)
  window.setTimeout("highwnf()", 11);
else
  {
  clearmove()
  if (selfplaymode) window.setTimeout("selfplayauto()", timebase*2);
  else 
   mymove=0;
  }
}
function highwnf()
{
  if (letzterbestzug.wnf==0) return unhighwnf();
  if (letzterbestzug.wnf>24) alert("fehler-wnf"+letzterbestzug.wnf);
  if (farbe==2) window.document.images[letzterbestzug.wnf+ofs].src = ssth.src;
  if (farbe==1) window.document.images[letzterbestzug.wnf+ofs].src = wsth.src;
  window.setTimeout("unhighwnf()", timebase);
}
function unhighwnf()
{
  if (letzterbestzug.wnf)
  {
  window.document.images[letzterbestzug.wnf+ofs].src = leer.src;
  }
  clearmove();
  if (selfplaymode) 
    window.setTimeout("selfplayauto()", timebase*2);
  else 
    {mymove=0;}
}

function pos2url()
{
 var aktpos=spf2string(spfeld,zugnr);
 window.location.href= (((location.href+'?').split('?'))[0])+
                            '?'+'pos='+aktpos+
                            '&'+'lang='+givelanguage()+ 
                            '&'+'level='+level+
                            '&'+'internally='+internally+
                            '&'+'takefrommillallowed='+takefrommillallowed;
}

function btntakeback(strlastpos)
{

 string2spf(strlastpos); clearmove();return;

   window.location.href= (((location.href+'?').split('?'))[0])+'?pos='+strlastpos;*/
}

{

   {string2spf("0000000000000000000000000"); clearmove();}

return language;

}

function pmuehcheck(zf,farb)
{

 if   (spfeld[pmuehmatr[zf][0]] == farb)
   if (spfeld[pmuehmatr[zf][1]] == farb)
     return 1;

 if   (spfeld[pmuehmatr[zf][2]] == farb)
   if (spfeld[pmuehmatr[zf][3]] == farb)
     return 2;

}

function bewerte(zuf)
{
 var wertung=0;
 if(zugnr>18 && stz[1]==3 && stz[2]==3)
   {
   var gegfarbe=3-farbe;
   wertung=openmill(farbe);
   if(takefrommillallowed) return wertung+zuf;
   if(wertung!=888) return wertung+zuf;
   for(var af=1; af<=24; af+=1)
     {
     if (spfeld[af] == gegfarbe)
       {
       if (pmuehcheck(af,gegfarbe))
         return-7; /*schlecht, kann nicht aus Muehle nehmen*/
       else
         return wertung+zuf;
       }
     }
   }
 if(zugnr<18) wertung += openmillsetz(farbe);
 wertung += (stz[farbe] - stz[3-farbe]) * stwert;
 if (stz[1]<7 && stz[2]<7) wertung=Math.floor(wertung/2);
 wertung += zggcounty(farbe) - zggcount(3-farbe) + zuf;
 return wertung;
}
