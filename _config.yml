# Name 
title: Nikolaus Dulgeridis Website

url: "https://nikolausdulgeridis.github.io"
baseurl: ""


# Default-Favicon (Base64)
default_favicon: "data:image/x-icon;base64,"

# Automatische Layout-Zuweisung

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

  - scope:
      path: "sitemap.xml"
    values:
      layout: null


plugins:
  - jekyll-sitemap

include:
  - _includes
  - _layouts