<script>

var bstellen=32;
var bgruppe=4;
function readDropValues()
{
var dropdown = document.getElementById("Stellen");
var selectedText = dropdown.options[dropdown.selectedIndex].text;
bstellen=(parseInt(selectedText));
if (isNaN(bstellen)) bstellen=4;

var dropdown = document.getElementById("Gruppe");
var selectedText = dropdown.options[dropdown.selectedIndex].text;
bgruppe=(parseInt(selectedText));
if (isNaN(bgruppe)) bgruppe=4;
}

</script>  <script>
// Testwerte
document.getElementById("input").value="1 2 3 ";

givehex();

function givehex()
{
 readDropValues();
 //alert(bstellen);
 //var bstellen=32;
 //var bgruppe=4;

 //alert(222);
 var hexa=document.getElementById("input").value;
 document.getElementById("input").value="";
 var a=hexa.split(" ");
 var inp="Dezimal: \n";
 var out="Binaer: \n";
 var myBin="";
 for (var i=0; i<a.length; i++)  {
   //alert(i+" "+a[i]);
   var myDez=parseInt(a[i]);
   if (isNaN(myDez)) myDez=0;
   if (myDez>0) 
    {  
    inp+=myDez+" \n"
    myBin = ""; //"0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    var myBin1 = ("000000000000000000000000000000000000"+myDez.toString(2)).slice(-1*bstellen);
    cnt=9;
    //alert("Q"+myBin1.slice(-1)+bgruppe+(myBin1.length>0));
    while (myBin1.length>0){
       if (myBin1.length>bgruppe) 
          {
          myBin=myBin1.slice(-1*bgruppe) +" "+ myBin; 
          //alert("A"+myBin1);
          myBin1=myBin1.slice(0,myBin1.length-1*bgruppe);
          //alert("B"+myBin1);
          //alert("C"+myBin);
          }
       else 
          {
          myBin=myBin1.slice(0) +" "+myBin; 
          myBin1="";
          }
       if (cnt--<0) break;
       };
    //alert("Result"+myBin);
    //document.write("* "+a[i]+" * " + myBin+" # <br>");
    out+=myBin+ "# "+("000000000"+myDez.toString(16)).slice(-8) + "\n";
    } //endif
  } // endfor
 document.getElementById("input").value=""+inp+"";
 document.getElementById("output").value=""+out+"";
}
